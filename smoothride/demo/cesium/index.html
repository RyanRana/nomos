<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>San Francisco — 3D map</title>

  <!-- Official Cesium CDN; CESIUM_BASE_URL must be set before Cesium.js loads. -->
  <script>window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/";</script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: #0b0e13; color: #e7ecf3; font-family: -apple-system, system-ui, sans-serif; text-align: center; }
    #msg[data-show] { display: flex; }
    #msg code { background: #1b2230; padding: 2px 6px; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="msg"></div>
  <script src="config.js" onerror="window.__noConfig=true"></script>
  <script src="cesium-murals.js"></script>
  <script src="app.js"></script>
</body>
</html>
